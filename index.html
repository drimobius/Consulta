<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scope Tracker - Consulta IL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #212529; }
        body.dark-mode { --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0; }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; overflow-x: hidden; }
        .card { background-color: var(--card); border: none; border-radius: 20px; }
        .theme-toggle { position: fixed; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; z-index: 10001; }
        
        /* CRONÓMETRO GIGANTE */
        #timerOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        #timerDisplay { font-size: clamp(4rem, 15vw, 8rem); font-family: 'Courier New', monospace; font-weight: bold; }
        #timerEmoji { font-size: 5rem; }
        #closeTimer { position: absolute; top: 20px; right: 30px; font-size: 4rem; cursor: pointer; color: #fff; line-height: 0.5; }

        .big-text { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .progress { height: 10px; border-radius: 5px; background-color: rgba(0,0,0,0.1); }
        body.dark-mode .progress { background-color: rgba(255,255,255,0.1); }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .critical { animation: blink 0.8s infinite; }
    </style>
</head>
<body class="pt-5 px-3">

    <div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</div>

    <div id="timerOverlay">
        <div id="closeTimer" onclick="cerrarCronometro()">&times;</div>
        <div id="timerEmoji">🧘</div>
        <div id="timerDisplay">00:00:00</div>
        <div id="timerStatus" class="mt-2 text-uppercase fw-bold h4"></div>
        <button class="btn btn-outline-light mt-5 px-5" onclick="cerrarCronometro()">SALIR</button>
    </div>

    <div class="container" style="max-width: 500px;">
        <h2 class="text-center mb-4 fw-bold">📦 Alcance de Conveyor</h2>
        
        <div class="card p-4 shadow-lg mb-4">
            <div class="input-group input-group-lg">
                <input type="text" id="searchInput" class="form-control text-uppercase border-0 bg-light" placeholder="SEBANGO (Ej: K056)">
                <button class="btn btn-primary px-4" onclick="buscarDato()">🔎</button>
            </div>
        </div>

        <div id="resultArea" class="card p-4 shadow-lg text-center" style="display:none;">
            <div id="mainEmoji" style="font-size: 4rem;">🧘</div>
            <p class="text-muted small fw-bold mb-0">ALCANCE RESTANTE:</p>
            <div id="resultadoTexto" class="big-text my-2">--</div>
            <div id="statusLabel" class="fw-bold text-uppercase mb-1 small"></div>
            
            <div class="progress mb-2">
                <div id="progressBar" class="progress-bar" role="progressbar" style="width: 100%"></div>
            </div>

            <p id="lastUploadLabel" class="text-muted mb-4" style="font-size: 0.7rem; font-style: italic;"></p>
            
            <button onclick="abrirCronometro()" class="btn btn-dark w-100 py-3 fw-bold rounded-pill shadow">
                ⏱️ PANTALLA COMPLETA
            </button>
        </div>

        <div id="errorArea" class="alert alert-danger mt-3 d-none text-center rounded-4">No se encontró el código.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAQLyNPSiyjKKPz3vyHr1rdVa0dBz7dq4",
            authDomain: "logistica-ktmex.firebaseapp.com",
            projectId: "logistica-ktmex",
            storageBucket: "logistica-ktmex.firebasestorage.app",
            messagingSenderId: "166597623735",
            appId: "1:166597623735:web:2da1c2d554cf4d6181b232"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; window.doc = doc; window.getDoc = getDoc;
    </script>

    <script>
        let deadline = null;
        let scopeOriginal = 0;
        let timerInterval = null;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeIcon').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        async function buscarDato() {
            const input = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!input) return;

            try {
                const docSnap = await window.getDoc(window.doc(window.db, "conveyors", input));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    scopeOriginal = data.scope;
                    
                    // Cálculo de Deadline basado en estampa de subida de App A
                    deadline = data.uploadTimestamp + (scopeOriginal * 3600000);

                    // Formatear fecha de última carga
                    const fechaCarga = new Date(data.uploadTimestamp).toLocaleString('es-MX', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    document.getElementById('lastUploadLabel').innerText = "Última carga de archivo en App A: " + fechaCarga;

                    actualizarUI();
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('errorArea').classList.add('d-none');
                } else {
                    document.getElementById('resultArea').style.display = 'none';
                    document.getElementById('errorArea').classList.remove('d-none');
                }
            } catch (e) { alert("Error de conexión."); }
        }

        function getUrgencia(horas) {
            if (horas > 17) return { c: "#28a745", e: "🧘 ✅", l: "Calma", p: 100 };
            if (horas > 8)  return { c: "#007bff", e: "⚙️ 🏃", l: "Acción", p: 60 };
            if (horas > 3)  return { c: "#fd7e14", e: "⚠️ ⚡", l: "Atención", p: 30 };
            return { c: "#dc3545", e: "🚨 🔥", l: horas <= 2 ? "CRÍTICO" : "URGENTE", p: 10, b: horas <= 2 };
        }

        function actualizarUI() {
            const horas = (deadline - Date.now()) / 3600000;
            const status = getUrgencia(horas);
            
            const txt = document.getElementById('resultadoTexto');
            txt.innerText = (horas > 0 ? horas.toFixed(1) : "0.0") + "h";
            txt.style.color = status.c;
            
            document.getElementById('mainEmoji').innerText = status.e;
            document.getElementById('statusLabel').innerText = status.l;
            document.getElementById('statusLabel').style.color = status.c;
            
            const bar = document.getElementById('progressBar');
            bar.style.width = Math.min(100, (horas / scopeOriginal) * 100) + "%";
            bar.style.backgroundColor = status.c;

            if (status.b) txt.classList.add('critical');
            else txt.classList.remove('critical');
        }

        function abrirCronometro() {
            document.getElementById('timerOverlay').style.display = 'flex';
            if (timerInterval) clearInterval(timerInterval);
            ejecutarReloj();
            timerInterval = setInterval(ejecutarReloj, 1000);
        }

        function cerrarCronometro() {
            document.getElementById('timerOverlay').style.display = 'none';
            clearInterval(timerInterval);
        }

        function ejecutarReloj() {
            const diff = deadline - Date.now();
            const horas = diff / 3600000;
            const status = getUrgencia(horas);
            const display = document.getElementById('timerDisplay');

            if (diff <= 0) {
                display.innerText = "00:00:00";
                display.style.color = "red";
                return;
            }

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            display.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            display.style.color = status.c;
            document.getElementById('timerEmoji').innerText = status.e;
            document.getElementById('timerStatus').innerText = "ESTADO: " + status.l;
            document.getElementById('timerStatus').style.color = status.c;

            if (status.b) display.classList.add('critical');
            else display.classList.remove('critical');

            actualizarUI();
        }
    </script>
</body>
</html>
